<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solid Drawing | Draw Flow</title>
  <style>
    :root {
      --bg-a: #101826;
      --bg-b: #1b2940;
      --text: #eef3fb;
      --accent: #9ad7c2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Source Sans Pro', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: linear-gradient(160deg, var(--bg-a) 0%, var(--bg-b) 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(680px, 100%);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(214, 226, 248, 0.22);
      border-radius: 18px;
      padding: 28px;
      backdrop-filter: blur(6px);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 42px);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    p {
      margin: 0;
      line-height: 1.6;
    }

    .page-nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .page-nav a,
    .actions a {
      display: inline-block;
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 12px;
      border: 1px solid rgba(154, 215, 194, 0.35);
      border-radius: 999px;
      padding: 8px 12px;
    }

    .actions {
      margin-top: 18px;
    }
  </style>
</head>
<body>
  <section class="card">
    <h1>Solid Drawing</h1>
    <p>This page is ready for your solid drawing content.</p>
    <nav class="page-nav" aria-label="Quick navigation">
      <a href="introduction">Introduction</a>
      <a href="lesson">Lesson</a>
      <a href="quiz">Quiz</a>
      <a href="exercises">Exercises</a>
    </nav>
    <div class="actions">
      <a href="../index">Back to Home</a>
    </div>
  </section>
</body>
</html>
